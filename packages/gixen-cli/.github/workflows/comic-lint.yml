name: Comic Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  comic-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for comic-specific terms in generic source files
        run: |
          # Grep for comic-specific terms that should not appear in the generic
          # gixen-cli source tree. These terms belong in the comic-pipeline plugin.
          #
          # cli.py is exempt for now: it hardcodes the gixen-overlay plugin
          # endpoint POST /api/bids/{item_id}/link-fmv and related flags
          # (--catalog-id, --comic-id, --grade). The long-term plan is to push
          # this call out of cli.py — either via a plugin-contributed CLI hook
          # or by moving it into the /comic:buy workflow — and drop this
          # exemption. Tracked alongside PER-140 / PER-147 / PER-148.
          MATCHES=$(find . -name "*.py" \
            -not -path "./tests/*" \
            -not -path "./docs/*" \
            -not -path "./.git/*" \
            -not -path "./.claude/*" \
            -not -path "./cli.py" \
            | xargs grep -lEi "\bcomic\b|\blocg\b|\bcgc\b|\bfmv\b" 2>/dev/null || true)

          if [ -n "$MATCHES" ]; then
            echo "ERROR: Comic-specific terms found outside legacy files:"
            echo "$MATCHES"
            echo ""
            echo "These terms (comic, locg, cgc, fmv) belong in the comic-pipeline plugin."
            echo "Remove the comic-specific code or move it to comic-pipeline."
            exit 1
          fi

          echo "OK: No unexpected comic-specific terms found."
