<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gixen ▸ comics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #16161e; --bg-alt: #1a1b26; --bg-panel: #1f2335; --bg-hover: #232744;
    --fg: #c0caf5; --fg-dim: #565f89; --fg-mute: #3b4261; --line: #2a2e44;
    --blue: #7aa2f7; --cyan: #7dcfff; --green: #9ece6a; --yellow: #e0af68;
    --orange: #ff9e64; --red: #f7768e; --magenta: #bb9af7;
  }

  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 13px; line-height: 1.5; padding: 0 0 28px 0;
  }
  a { color: var(--cyan); text-decoration: none; }
  a:hover { color: var(--blue); text-decoration: underline; }

  .topbar {
    display: flex; align-items: stretch;
    background: var(--bg-alt); border-bottom: 1px solid var(--line);
    font-size: 12px; height: 28px;
  }
  .topbar .seg { display: flex; align-items: center; padding: 0 12px; }
  .topbar .seg.brand { background: var(--magenta); color: var(--bg); font-weight: 700; letter-spacing: 0.04em; }
  .topbar a.nav { color: var(--fg-dim); text-decoration: none; }
  .topbar a.nav:hover { color: var(--fg); background: var(--bg-hover); }
  .topbar a.nav.active { color: var(--blue); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .topbar .seg.host { color: var(--fg-dim); }
  .topbar .seg.clock { color: var(--green); }

  .wrap { padding: 18px 22px; max-width: 1500px; margin: 0 auto; }

  .session { color: var(--fg-dim); font-size: 12px; margin-bottom: 16px; }
  .session .prompt { color: var(--green); }
  .session .cmd { color: var(--fg); }
  .session .arg { color: var(--yellow); }
  .session .ok { color: var(--green); }
  .session .err { color: var(--red); }

  .panel {
    background: var(--bg-panel); border: 1px solid var(--line);
    border-radius: 6px; margin-bottom: 18px; overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: var(--bg-alt);
    border-bottom: 1px solid var(--line); font-size: 12px;
  }
  .panel-head .label { color: var(--blue); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .panel-head .count { color: var(--fg-dim); font-size: 11px; }
  .panel-head .badge {
    margin-left: auto; padding: 1px 8px; border-radius: 3px;
    background: var(--bg-hover); color: var(--fg-dim); font-size: 11px;
  }

  .scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: left; color: var(--fg-dim); font-weight: 500;
    padding: 8px 14px; background: var(--bg-alt);
    border-bottom: 1px solid var(--line);
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.05em; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: 0; }
  tbody tr:hover { background: var(--bg-hover); }
  td { padding: 7px 14px; vertical-align: top; white-space: nowrap; }
  td.wrap { white-space: normal; max-width: 320px; line-height: 1.4; }
  .right { text-align: right; }
  .num { font-variant-numeric: tabular-nums; }
  .id { color: var(--cyan); }
  .dim { color: var(--fg-dim); }
  .mute { color: var(--fg-mute); font-style: italic; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .pill.conf-high { background: rgba(158,206,106,0.18); color: var(--green); }
  .pill.conf-medium { background: rgba(224,175,104,0.18); color: var(--yellow); }
  .pill.conf-low { background: rgba(247,118,142,0.18); color: var(--red); }

  .empty { color: var(--fg-mute); padding: 14px; font-style: italic; font-size: 12px; }

  .keybar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 18px;
    background: var(--bg-alt); border-top: 1px solid var(--line);
    padding: 6px 22px; font-size: 11px; color: var(--fg-dim); z-index: 50;
  }
  .keybar kbd {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    background: var(--bg-hover); color: var(--fg);
    font-family: inherit; font-size: 11px; margin-right: 4px;
  }
  .keybar .spacer { flex: 1; }
  .keybar .stat.is-loading { color: var(--yellow); }
  .keybar .stat.is-error { color: var(--red); }
  .keybar .stat.is-ok { color: var(--green); }

  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; background: var(--fg-dim); }
  .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.loading { background: var(--yellow); }
  .dot.err { background: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <div class="seg brand">▎ gixen</div>
  <a class="seg nav" href="/v2">snipes</a>
  <a class="seg nav active" href="/v2/comics">▸ comics</a>
  <a class="seg nav" href="/v2/bids">bids</a>
  <div class="spacer"></div>
  <div class="seg host">mac-mini.tail9b7fa5.ts.net</div>
  <div class="seg clock" id="clock">--:--:--</div>
</div>

<div class="wrap">
  <div class="session" id="session">
    <span class="prompt">$</span> <span class="cmd">gixen-db</span> <span class="arg">--table</span> <span class="arg">comics</span> <span class="ok">▸ ready</span>
  </div>
  <div id="comics-section"></div>
</div>

<div class="keybar">
  <span><kbd>r</kbd>refresh</span>
  <span><kbd>s</kbd>snipes</span>
  <span><kbd>c</kbd>comics</span>
  <span><kbd>b</kbd>bids</span>
  <span class="spacer"></span>
  <span class="stat is-loading" id="status"><span class="dot loading"></span><span id="status-text">connecting…</span></span>
</div>

<script>
const REFRESH_MS = 60000;
const params = new URLSearchParams(location.search);
const SNIPES_URL = "/api/snipes";

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function fmtFmv(r) {
  const lo = r.fmv_low, hi = r.fmv_high;
  if (lo == null && hi == null) return '<span class="mute">—</span>';
  if (lo != null && hi != null) {
    if (Math.round(lo) === Math.round(hi)) return `$${Math.round(lo)}`;
    return `$${Math.round(lo)}–${Math.round(hi)}`;
  }
  return `$${Math.round(lo ?? hi)}`;
}

function gradeLabel(g) {
  if (g == null) return null;
  const n = parseFloat(g);
  if (isNaN(n)) return String(g);
  if (n >= 9.8) return "NM/M";
  if (n >= 9.4) return "NM+";
  if (n >= 9.0) return "NM";
  if (n >= 8.5) return "VF+";
  if (n >= 8.0) return "VF";
  if (n >= 7.5) return "VF-";
  if (n >= 7.0) return "FN/VF";
  if (n >= 6.5) return "FN+";
  if (n >= 6.0) return "FN";
  if (n >= 5.5) return "FN-";
  if (n >= 5.0) return "VG/FN";
  if (n >= 4.5) return "VG+";
  if (n >= 4.0) return "VG";
  if (n >= 3.5) return "VG-";
  if (n >= 3.0) return "GD/VG";
  if (n >= 2.5) return "GD+";
  if (n >= 2.0) return "GD";
  if (n >= 1.5) return "FR/GD";
  if (n >= 1.0) return "FR";
  return "PR";
}

function confPill(c) {
  if (!c) return '<span class="mute">—</span>';
  const cl = String(c).toLowerCase();
  return `<span class="pill conf-${cl}">${cl}</span>`;
}

function deriveComics(snipes) {
  const seen = new Map();
  for (const r of snipes) {
    if (!r.comic_id || seen.has(r.comic_id)) continue;
    seen.set(r.comic_id, {
      id: r.comic_id,
      title: r.comic_title,
      issue: r.comic_issue,
      year: r.comic_year,
      grade: r.comic_grade,
      fmv_low: r.fmv_low,
      fmv_high: r.fmv_high,
      fmv_comps: r.fmv_comps,
      fmv_confidence: r.fmv_confidence,
      fmv_notes: r.fmv_notes,
    });
  }
  return [...seen.values()].sort((a,b) => (a.title||"").localeCompare(b.title||""));
}

function renderComics(snipes) {
  const comics = deriveComics(snipes);
  const el = document.getElementById("comics-section");
  if (!comics.length) {
    el.innerHTML = `<div class="panel">
      <div class="panel-head"><span class="label">comics</span><span class="count">0 rows</span></div>
      <div class="empty">// no comics linked to bids yet — add a snipe via cli.py with --comic / --fmv-* flags</div>
    </div>`;
    return;
  }
  const rows = comics.map(c => `<tr>
    <td class="num dim">${c.id}</td>
    <td>${c.title ? escapeHtml(c.title) : '<span class="mute">—</span>'}</td>
    <td class="num">${c.issue != null ? escapeHtml(c.issue) : '<span class="mute">—</span>'}</td>
    <td class="num dim">${c.year ?? '<span class="mute">—</span>'}</td>
    <td class="num">${c.grade != null ? `${c.grade} ${gradeLabel(c.grade) ? `<span class="dim">(${gradeLabel(c.grade)})</span>` : ''}` : '<span class="mute">—</span>'}</td>
    <td class="right num">${fmtFmv(c)}</td>
    <td class="right num dim">${c.fmv_comps ?? '<span class="mute">—</span>'}</td>
    <td>${confPill(c.fmv_confidence)}</td>
    <td class="wrap dim">${c.fmv_notes ? escapeHtml(c.fmv_notes) : '<span class="mute">—</span>'}</td>
  </tr>`).join("");
  el.innerHTML = `<div class="panel">
    <div class="panel-head">
      <span class="label">comics</span>
      <span class="count">${comics.length} rows</span>
      <span class="badge">unique by comic_id</span>
    </div>
    <div class="scroll"><table><thead><tr>
      <th>id</th><th>title</th><th>issue</th><th>year</th>
      <th>grade</th><th class="right">fmv</th><th class="right">comps</th>
      <th>conf</th><th>notes</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

function setStatus(state, text) {
  const el = document.getElementById("status");
  const t = document.getElementById("status-text");
  el.classList.remove("is-loading","is-error","is-ok");
  el.classList.add("is-"+state);
  el.querySelector(".dot").className = "dot " + (state === "ok" ? "ok" : state === "error" ? "err" : "loading");
  t.textContent = text;
}

function tickClock() { document.getElementById("clock").textContent = new Date().toLocaleTimeString(); }
setInterval(tickClock, 1000); tickClock();

async function load() {
  setStatus("loading", `fetching ${SNIPES_URL}…`);
  try {
    const resp = await fetch(SNIPES_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const snipes = await resp.json();
    renderComics(snipes);
    const now = new Date().toLocaleTimeString();
    const comics = deriveComics(snipes).length;
    document.getElementById("session").innerHTML =
      `<span class="prompt">$</span> <span class="cmd">gixen-db</span> <span class="arg">--table</span> <span class="arg">comics</span> <span class="ok">▸ ${comics} rows · synced ${now}</span>`;
    setStatus("ok", `${comics} rows`);
  } catch (e) {
    setStatus("error", e.message);
    document.getElementById("session").innerHTML = `<span class="prompt">$</span> <span class="cmd">gixen-db</span> <span class="err">▸ ${e.message}</span>`;
  }
}

document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "r") load();
  if (e.key === "s") location.href = "/v2";
  if (e.key === "c") location.href = "/v2/comics";
  if (e.key === "b") location.href = "/v2/bids";
});

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
