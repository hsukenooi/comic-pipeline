<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gixen ▸ snipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/v2.css">
<style>
  /* v2-tui (snipes dashboard) — page-specific styles. Shared chrome lives in v2.css. */

  tbody tr.overbid { background: rgba(247,118,142,0.08); }
  tbody tr.overbid:hover { background: rgba(247,118,142,0.16); }

  td.title {
    max-width: 380px;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .warn-cell { color: var(--red); font-weight: 700; }
  .urgent-cell { color: var(--orange); font-weight: 700; }

  /* inline-edit max_bid */
  .editable-max {
    cursor: pointer;
    border-bottom: 1px dotted transparent;
    transition: border-color 0.15s, background 0.15s;
  }
  .editable-max:hover { border-bottom-color: var(--fg-dim); }
  .editable-max.editing { cursor: text; }
  .editable-max.saving {
    color: var(--yellow);
    animation: pulse-saving 0.9s ease-in-out infinite;
  }
  .editable-max.saved { color: var(--green); transition: color 1.2s; }
  .editable-max.save-error { color: var(--red); }
  @keyframes pulse-saving {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .max-input {
    width: 80px;
    background: var(--bg-alt);
    color: var(--fg);
    border: 1px solid var(--blue);
    border-radius: 3px;
    padding: 1px 6px;
    font: inherit;
    text-align: right;
    -moz-appearance: textfield;
  }
  .max-input::-webkit-outer-spin-button,
  .max-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .max-input:focus { outline: none; border-color: var(--cyan); }

  /* per-row remove control */
  .remove-btn {
    visibility: hidden;
    margin-left: 8px;
    padding: 0 6px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--fg-dim);
    border-radius: 3px;
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    line-height: 18px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  tbody tr:hover .remove-btn { visibility: visible; }
  .remove-btn:hover {
    color: var(--red);
    border-color: var(--red);
    background: rgba(247,118,142,0.1);
  }
  .remove-btn.confirming {
    visibility: visible;
    color: var(--red);
    border-color: var(--red);
    background: rgba(247,118,142,0.18);
    font-weight: 600;
  }
  tbody tr.removing { opacity: 0.4; transition: opacity 0.25s; }

  /* keybar 'r' refresh button */
  .keybar .key-action {
    background: none;
    border: none;
    color: inherit;
    font: inherit;
    cursor: pointer;
    padding: 0;
  }
  .keybar .key-action:hover { color: var(--fg); }

  /* attention flags */
  .flags {
    background: rgba(224,175,104,0.06);
    border: 1px solid rgba(224,175,104,0.35);
    border-left: 3px solid var(--yellow);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 18px;
  }
  .flags h3 {
    color: var(--yellow);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .flags ul { list-style: none; }
  .flags li { padding: 3px 0; font-size: 12px; color: var(--fg); }
  .flags li::before { content: "▲ "; color: var(--yellow); }

  /* top-of-page refresh sweep — visible only while a Gixen pull is in flight */
  .refresh-bar {
    position: fixed;
    top: 28px;
    left: 0; right: 0;
    height: 2px;
    background: var(--bg-alt);
    overflow: hidden;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .refresh-bar.is-active { opacity: 1; }
  .refresh-bar::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    transform: translateX(-100%);
    animation: refresh-sweep 1.1s ease-in-out infinite;
  }
  @keyframes refresh-sweep {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
</style>

</head>

</div>

<script>
const REFRESH_MS = 30000;
const params = new URLSearchParams(location.search);
const DEMO = params.has("demo");
const SNIPES_URL = "/api/snipes";
const ebayUrl = id => `https://www.ebay.com/itm/${id}`;

    // ended — won
    { item_id: "889345678901", title: "New Mutants #98 — 1st Deadpool VF 1991",

    { item_id: "101567890123", title: "Fantastic Four #52 — 1st Black Panther 1966 GD",

    { item_id: "212678901234", title: "Spawn #1 1st Print 1992 NM/M",

      fmv_low: 25, fmv_high: 40, fmv_confidence: "medium" },

    // ended — won
    { item_id: "323789012345", title: "Uncanny X-Men #266 — 1st Gambit FN+ 1990",

function timeLeft(iso) {
  if (!iso) return "—";
  const diff = new Date(iso) - Date.now();
  if (diff <= 0) return "ENDED";
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  if (d >= 1) return `${d}d ${h}h`;
  if (diff < 3600000) return m > 0 ? `${m}m` : "<1m";
  return `${h}h`;
}

function fmtFmv(r) {
  const lo = r.fmv_low, hi = r.fmv_high;
  if (lo == null && hi == null) return '<span class="seller">—</span>';
  if (lo != null && hi != null) {
    if (Math.round(lo) === Math.round(hi)) return `$${Math.round(lo)}`;
    return `$${Math.round(lo)}–${Math.round(hi)}`;
  }
  return `$${Math.round(lo ?? hi)}`;
}

const isEnded = r => r.end_date_iso ? new Date(r.end_date_iso) <= Date.now() : (r.time_to_end||"").toUpperCase() === "ENDED";
const parseAmt = s => { if (s==null) return null; const n = parseFloat(String(s).replace(/[^0-9.]/g,"")); return isNaN(n) ? null : n; };
const fmtUSD = s => { const n = parseAmt(s); return n != null ? `$${n.toFixed(2)}` : "—"; };

function statusPill(r) {
  const s = (r.status||"").toUpperCase(), sm = (r.status_mirror||"").toUpperCase();
  if (s.includes("WON")||sm.includes("WON")) return '<span class="pill won">won</span>';
  if (s.startsWith("BID UNDER")||s==="OUTBID"||s==="LOST"||sm.startsWith("BID UNDER")||sm==="OUTBID"||sm==="LOST") return '<span class="pill lost">outbid</span>';
  if (s.startsWith("NETWORK ERROR")||sm.startsWith("NETWORK ERROR")) return '<span class="pill err">net err</span>';
  if (s==="PENDING") return '<span class="pill pending">pending</span>';
  return `<span class="pill lost">${(r.status||"—").toLowerCase()}</span>`;
}

function gradeLabel(g) {
  if (g == null) return null;
  const n = parseFloat(g);
  if (isNaN(n)) return String(g);
  if (n >= 9.8) return "NM/M";
  if (n >= 9.4) return "NM+";
  if (n >= 9.0) return "NM";
  if (n >= 8.5) return "VF+";
  if (n >= 8.0) return "VF";
  if (n >= 7.5) return "VF-";
  if (n >= 7.0) return "FN/VF";
  if (n >= 6.5) return "FN+";
  if (n >= 6.0) return "FN";
  if (n >= 5.5) return "FN-";
  if (n >= 5.0) return "VG/FN";
  if (n >= 4.5) return "VG+";
  if (n >= 4.0) return "VG";
  if (n >= 3.5) return "VG-";
  if (n >= 3.0) return "GD/VG";
  if (n >= 2.5) return "GD+";
  if (n >= 2.0) return "GD";
  if (n >= 1.5) return "FR/GD";
  if (n >= 1.0) return "FR";
  return "PR";
}

function displayTitle(r) {
  return r.title
    || (r.comic_title && r.comic_issue != null ? `${r.comic_title} #${r.comic_issue}` : "—");
}

// Escape arbitrary text for safe inclusion in HTML — element content OR
// quoted attribute values. Used everywhere we interpolate user-controlled
// data (eBay titles, sellers, comic notes) into a template literal that
// gets assigned to innerHTML.
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
const attrEscape = escapeHtml;  // back-compat alias

function displayCondition(r) {
  const g = gradeLabel(r.comic_grade);
  return g || '<span class="seller">—</span>';
}

function buildFlags(snipes) {
  const lines = [];
  for (const r of snipes) {
    if (!isEnded(r)) {
      const cur = parseAmt(r.current_bid), max = parseAmt(r.max_bid);
      if (cur!=null && max!=null && cur>=max) lines.push(`#${r.item_id} "${displayTitle(r)}" — current $${cur.toFixed(2)} ≥ max $${max.toFixed(2)}. raise or cancel?`);
    } else {
      const s = (r.status||"").toUpperCase(), sm = (r.status_mirror||"").toUpperCase();
      if (s.startsWith("NETWORK ERROR") && sm.startsWith("NETWORK ERROR")) lines.push(`#${r.item_id} "${displayTitle(r)}" — bid failed on main+mirror. re-snipe if relisted.`);
    }
  }
  return lines;
}

function renderActive(snipes) {
  const active = snipes.filter(r => !isEnded(r)).sort((a,b)=>(a.end_date_iso?new Date(a.end_date_iso):Infinity)-(b.end_date_iso?new Date(b.end_date_iso):Infinity));
  const el = document.getElementById("active-section");
  if (!active.length) {
    el.innerHTML = `<div class="panel"><div class="panel-head"><span class="label">active</span><span class="count">0 rows</span><span class="badge">live</span></div><div class="empty">// no active snipes</div></div>`;
    return;
  }
  const rows = active.map(r => {
    const cur = parseAmt(r.current_bid), max = parseAmt(r.max_bid);
    const overbid = cur!=null && max!=null && cur>=max;
    const tl = r.end_date_iso ? timeLeft(r.end_date_iso) : (r.time_to_end||"—");
    const urgent = r.end_date_iso && (new Date(r.end_date_iso)-Date.now()) < 3600000;
    const timeCell = urgent ? `<span class="urgent-cell">${tl}</span>` : tl;
    const maxInner = overbid ? `<span class="warn-cell">▲ $${max.toFixed(2)}</span>` : fmtUSD(r.max_bid);
    const maxCell = `<span class="editable-max" data-item-id="${r.item_id}" `
      + `data-current-max="${parseFloat(r.max_bid)}" `
      + `data-bid-offset="${r.bid_offset ?? 6}" `
      + `data-snipe-group="${r.snipe_group ?? 0}" `
      + `title="click to edit">${maxInner}</span>`;
    const fullTitle = r.title || displayTitle(r);
    return `<tr class="${overbid?"overbid":""}" data-item-id="${r.item_id}">
      <td><a class="item-id" href="${ebayUrl(r.item_id)}" target="_blank">${r.item_id}</a></td>
      <td class="title" title="${escapeHtml(fullTitle)}">${escapeHtml(displayTitle(r))}</td>
      <td>${displayCondition(r)}</td>
      <td class="right num">${fmtUSD(r.current_bid)}</td>
      <td class="right num">${maxCell}</td>
      <td class="right num">${fmtFmv(r)}</td>
      <td class="right num">${timeCell}</td>
      <td class="seller">${escapeHtml(r.seller||"—")}<button class="remove-btn" data-item-id="${r.item_id}" aria-label="remove snipe">✕</button></td>
    </tr>`;
  }).join("");
  el.innerHTML = `<div class="panel">
    <div class="panel-head"><span class="label">active</span><span class="count">${active.length} rows</span><span class="badge">live</span></div>
    <table><thead><tr>
      <th>item</th><th>title</th><th>cond</th>
      <th class="right">current</th><th class="right">max</th>
      <th class="right">fmv</th>
      <th class="right">t-minus</th><th>seller</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function renderEnded(snipes) {
  const ended = snipes.filter(r => isEnded(r)).sort((a,b)=>(b.end_date_iso?new Date(b.end_date_iso):0)-(a.end_date_iso?new Date(a.end_date_iso):0));
  const el = document.getElementById("ended-section");
  if (!ended.length) {
    el.innerHTML = `<div class="panel"><div class="panel-head"><span class="label">recently ended</span><span class="count">0 rows</span></div><div class="empty">// none</div></div>`;
    return;
  }
  const rows = ended.map(r => {
    const winning = r.winning_bid != null ? `$${parseFloat(r.winning_bid).toFixed(2)}` : fmtUSD(r.current_bid);
    const fullTitle = r.title || displayTitle(r);
    return `<tr>
      <td><a class="item-id" href="${ebayUrl(r.item_id)}" target="_blank">${r.item_id}</a></td>
      <td class="title" title="${escapeHtml(fullTitle)}">${escapeHtml(displayTitle(r))}</td>
      <td>${displayCondition(r)}</td>
      <td class="right num">${winning}</td>
      <td class="right num">${fmtUSD(r.max_bid)}</td>
      <td class="right num">${fmtFmv(r)}</td>
      <td>${statusPill(r)}</td>
      <td class="seller">${escapeHtml(r.seller||"—")}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<div class="panel">
    <div class="panel-head"><span class="label">recently ended</span><span class="count">${ended.length} rows</span></div>
    <table><thead><tr>
      <th>item</th><th>title</th><th>cond</th>
      <th class="right">winning</th><th class="right">max</th>
      <th class="right">fmv</th>
      <th>result</th><th>seller</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function renderFlags(snipes) {
  const flags = buildFlags(snipes);
  const el = document.getElementById("flags-container");
  el.innerHTML = flags.length ? `<div class="flags"><h3>attention required</h3><ul>${flags.map(f=>`<li>${escapeHtml(f)}</li>`).join("")}</ul></div>` : "";
}

function setStatus(state, text) {
  const el = document.getElementById("status");
  const t = document.getElementById("status-text");
  el.classList.remove("is-loading","is-error","is-ok");
  el.classList.add("is-"+state);
  el.querySelector(".dot").className = "dot " + (state === "ok" ? "ok" : state === "error" ? "err" : "loading");
  t.textContent = text;
}

function tickClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}
setInterval(tickClock, 1000);
tickClock();

// Snipes the table is currently rendering. Repaints (1s tick for time-to-end
// countdowns, edit/remove optimism) reuse this without re-hitting Gixen.
let _lastSnipes = null;
let _lastSyncedAt = null;  // local timestamp of the most recent successful fetch

function renderAll(snipes) {
  if (!snipes) return;
  renderFlags(snipes);
  renderActive(snipes);
  renderEnded(snipes);

  const demoTag = DEMO ? ' <span class="arg">[DEMO]</span>' : '';
  let cacheTag = '';
  if (!DEMO) {
    const newest = snipes.reduce((acc, r) => {
      if (!r.cached_at) return acc;
      const t = new Date(r.cached_at).getTime();
      return t > acc ? t : acc;
    }, 0);
    if (newest > 0) {
      const ageS = Math.max(0, Math.floor((Date.now() - newest) / 1000));
      const ageStr = ageS < 90 ? `${ageS}s ago` : `${Math.floor(ageS/60)}m ago`;
      cacheTag = ` <span class="arg">· cache ${ageStr}</span>`;
    } else {
      cacheTag = ` <span class="err">· cache empty (warming up)</span>`;
    }
  }
  const syncedAtStr = _lastSyncedAt
    ? `synced ${_lastSyncedAt.toLocaleTimeString()}`
    : 'never synced';
  document.getElementById("session").innerHTML =
    `<span class="prompt">$</span> <span class="cmd">gixen</span> <span class="arg">--list</span>${demoTag} `
    + `<span class="ok">▸ ${snipes.length} rows · ${syncedAtStr}</span>${cacheTag} `
    + `<span class="arg">· press r to refresh</span>`;
}

async function load() {
  if (_inFlight) return;
  _inFlight = true;
  setStatus("loading", DEMO ? "loading demo fixture…" : "syncing from gixen…");
  document.getElementById("refresh-bar").classList.add("is-active");
  try {
    let snipes;
    if (DEMO) {
      snipes = demoData();
    } else {
      const resp = await fetch(SNIPES_URL);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      snipes = await resp.json();
    }
    _lastSnipes = snipes;
    _lastSyncedAt = new Date();
    renderAll(snipes);
    setStatus("ok", `${snipes.length} rows${DEMO ? " · demo" : ""}`);
  } catch (e) {
    setStatus("error", e.message);
    document.getElementById("session").innerHTML = `<span class="prompt">$</span> <span class="cmd">gixen</span> <span class="err">▸ ${e.message}</span>`;
  } finally {
    document.getElementById("refresh-bar").classList.remove("is-active");
    _inFlight = false;
  }
}

let _inFlight = false;

// While a user-initiated edit/remove is in flight, skip the auto-refresh
// tick so a stale Gixen pull can't clobber the optimistic value.
let suppressRefresh = false;

// ---- inline-edit max_bid -------------------------------------------------

function startMaxEdit(cell) {
  if (cell.classList.contains("editing") || cell.classList.contains("saving")) return;
  const current = parseFloat(cell.dataset.currentMax);
  cell.classList.add("editing");
  cell.innerHTML = `<input type="number" step="0.01" min="0.01" value="${current.toFixed(2)}" class="max-input" autocomplete="off">`;
  const input = cell.querySelector("input");
  input.focus();
  input.select();

  const restore = () => {
    cell.classList.remove("editing");
    const m = parseFloat(cell.dataset.currentMax);
    cell.innerHTML = `$${m.toFixed(2)}`;
  };

  let done = false;
  const finish = (commit) => {
    if (done) return;
    done = true;
    if (!commit) { restore(); return; }
    const val = parseFloat(input.value);
    const current = parseFloat(cell.dataset.currentMax);
    if (isNaN(val) || val <= 0 || val === current) { restore(); return; }
    saveMaxBid(cell, val);
  };

  input.addEventListener("keydown", ev => {
    if (ev.key === "Enter") { ev.preventDefault(); finish(true); }
    else if (ev.key === "Escape") { ev.preventDefault(); finish(false); }
  });
  input.addEventListener("blur", () => finish(true));
}

async function saveMaxBid(cell, newMax) {
  const itemId = cell.dataset.itemId;
  const bidOffset = parseInt(cell.dataset.bidOffset, 10) || 6;
  const snipeGroup = parseInt(cell.dataset.snipeGroup, 10) || 0;

  cell.classList.remove("editing");
  cell.classList.add("saving");
  cell.innerHTML = `$${newMax.toFixed(2)}`;
  suppressRefresh = true;

  // Bound the PATCH so a hung Gixen call can't strand suppressRefresh=true
  // and freeze the in-page repaint tick indefinitely. 30s is generous; the
  // server's own _api_lock + Gixen scrape comfortably finishes well under.
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 30000);

  try {
    const resp = await fetch(`/api/bids/${itemId}`, {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        max_bid: newMax,
        bid_offset: bidOffset,
        snipe_group: snipeGroup,
      }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if (!resp.ok) {
      let detail = `HTTP ${resp.status}`;
      try { const j = await resp.json(); if (j.detail) detail = j.detail; } catch (_) {}
      throw new Error(detail);
    }
    cell.classList.remove("saving");
    cell.classList.add("saved");
    cell.dataset.currentMax = String(newMax);
    setTimeout(() => cell.classList.remove("saved"), 1200);
    suppressRefresh = false;
    load();
  } catch (e) {
    clearTimeout(timer);
    cell.classList.remove("saving");
    cell.classList.add("save-error");
    const prev = parseFloat(cell.dataset.currentMax);
    cell.innerHTML = `$${prev.toFixed(2)}`;
    const msg = e.name === "AbortError" ? "save timed out" : e.message;
    cell.title = `save failed: ${msg}`;
    setTimeout(() => {
      cell.classList.remove("save-error");
      cell.title = "click to edit";
    }, 3500);
    suppressRefresh = false;
  }
}

// ---- per-row remove (two-click confirm) ----------------------------------

function resetConfirms(except) {
  document.querySelectorAll(".remove-btn.confirming").forEach(b => {
    if (b === except) return;
    b.classList.remove("confirming");
    b.textContent = "✕";
    if (b._confirmTimer) clearTimeout(b._confirmTimer);
  });
}

async function confirmRemove(btn) {
  const itemId = btn.dataset.itemId;
  const tr = btn.closest("tr");
  if (!tr) return;
  tr.classList.add("removing");
  suppressRefresh = true;
  try {
    const resp = await fetch(`/api/bids/${itemId}`, {method: "DELETE"});
    if (!resp.ok) {
      let detail = `HTTP ${resp.status}`;
      try { const j = await resp.json(); if (j.detail) detail = j.detail; } catch (_) {}
      throw new Error(detail);
    }
    tr.style.opacity = "0";
    setTimeout(() => { suppressRefresh = false; load(); }, 250);
  } catch (e) {
    tr.classList.remove("removing");
    btn.classList.remove("confirming");
    btn.textContent = "✕";
    btn.title = `remove failed: ${e.message}`;
    setTimeout(() => { btn.title = "remove snipe"; }, 3500);
    suppressRefresh = false;
  }
}

document.addEventListener("click", e => {
  // editable max cell
  const cell = e.target.closest(".editable-max");
  if (cell) {
    if (!cell.classList.contains("editing") && !cell.classList.contains("saving")) {
      startMaxEdit(cell);
    }
    return;
  }

  // remove button
  const btn = e.target.closest(".remove-btn");
  if (btn) {
    resetConfirms(btn);
    if (btn.classList.contains("confirming")) {
      // Guard against rapid double-click: require >=400ms between arming and
      // the confirming click. A real two-click confirm always exceeds this.
      const armedAt = btn._armedAt || 0;
      if (Date.now() - armedAt < 400) return;
      if (btn._confirmTimer) clearTimeout(btn._confirmTimer);
      confirmRemove(btn);
    } else {
      btn.classList.add("confirming");
      btn.textContent = "✕ remove?";
      btn._armedAt = Date.now();
      btn._confirmTimer = setTimeout(() => {
        btn.classList.remove("confirming");
        btn.textContent = "✕";
      }, 5000);
    }
    return;
  }

  // click anywhere else cancels any pending confirmation
  resetConfirms(null);
});

// Manual refresh: 'r' key + the keybar button.
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "r" || e.key === "R") {
    e.preventDefault();
    load();
  }
});
document.getElementById("refresh-btn").addEventListener("click", e => {
  e.preventDefault();
  load();
});

// In-page repaint tick — keeps time-to-end countdowns and the "cache Xs ago"
// indicator current without hitting Gixen. No network calls here.
function repaint() {
  if (suppressRefresh) return;          // user is editing/removing — don't clobber
  if (!_lastSnipes) return;
  if (document.querySelector(".editable-max.editing, .editable-max.saving")) return;
  if (document.querySelector(".remove-btn.confirming")) return;
  renderAll(_lastSnipes);
}

load();
setInterval(repaint, 1000);
</script>
</body>
</html>
