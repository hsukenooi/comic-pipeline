<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gixen ▸ bids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #16161e; --bg-alt: #1a1b26; --bg-panel: #1f2335; --bg-hover: #232744;
    --fg: #c0caf5; --fg-dim: #565f89; --fg-mute: #3b4261; --line: #2a2e44;
    --blue: #7aa2f7; --cyan: #7dcfff; --green: #9ece6a; --yellow: #e0af68;
    --orange: #ff9e64; --red: #f7768e; --magenta: #bb9af7;
  }

  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 13px; line-height: 1.5; padding: 0 0 28px 0;
  }
  a { color: var(--cyan); text-decoration: none; }
  a:hover { color: var(--blue); text-decoration: underline; }

  .topbar {
    display: flex; align-items: stretch;
    background: var(--bg-alt); border-bottom: 1px solid var(--line);
    font-size: 12px; height: 28px;
  }
  .topbar .seg { display: flex; align-items: center; padding: 0 12px; }
  .topbar .seg.brand { background: var(--magenta); color: var(--bg); font-weight: 700; letter-spacing: 0.04em; }
  .topbar a.nav { color: var(--fg-dim); text-decoration: none; }
  .topbar a.nav:hover { color: var(--fg); background: var(--bg-hover); }
  .topbar a.nav.active { color: var(--blue); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .topbar .seg.host { color: var(--fg-dim); }
  .topbar .seg.clock { color: var(--green); }

  .wrap { padding: 18px 22px; max-width: 1500px; margin: 0 auto; }

  .session { color: var(--fg-dim); font-size: 12px; margin-bottom: 16px; }
  .session .prompt { color: var(--green); }
  .session .cmd { color: var(--fg); }
  .session .arg { color: var(--yellow); }
  .session .ok { color: var(--green); }
  .session .err { color: var(--red); }

  .panel {
    background: var(--bg-panel); border: 1px solid var(--line);
    border-radius: 6px; margin-bottom: 18px; overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: var(--bg-alt);
    border-bottom: 1px solid var(--line); font-size: 12px;
  }
  .panel-head .label { color: var(--blue); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .panel-head .count { color: var(--fg-dim); font-size: 11px; }
  .panel-head .badge {
    margin-left: auto; padding: 1px 8px; border-radius: 3px;
    background: var(--bg-hover); color: var(--fg-dim); font-size: 11px;
  }

  .scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: left; color: var(--fg-dim); font-weight: 500;
    padding: 8px 14px; background: var(--bg-alt);
    border-bottom: 1px solid var(--line);
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.05em; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: 0; }
  tbody tr:hover { background: var(--bg-hover); }
  td { padding: 7px 14px; vertical-align: top; white-space: nowrap; }
  td.wrap { white-space: normal; max-width: 320px; line-height: 1.4; }
  .right { text-align: right; }
  .num { font-variant-numeric: tabular-nums; }
  .id { color: var(--cyan); }
  .dim { color: var(--fg-dim); }
  .mute { color: var(--fg-mute); font-style: italic; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .pill.won { background: rgba(158,206,106,0.18); color: var(--green); }
  .pill.lost { background: rgba(86,95,137,0.25); color: var(--fg-dim); }
  .pill.err { background: rgba(247,118,142,0.18); color: var(--red); }
  .pill.pending { background: rgba(224,175,104,0.18); color: var(--yellow); }

  .empty { color: var(--fg-mute); padding: 14px; font-style: italic; font-size: 12px; }

  .keybar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 18px;
    background: var(--bg-alt); border-top: 1px solid var(--line);
    padding: 6px 22px; font-size: 11px; color: var(--fg-dim); z-index: 50;
  }
  .keybar kbd {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    background: var(--bg-hover); color: var(--fg);
    font-family: inherit; font-size: 11px; margin-right: 4px;
  }
  .keybar .spacer { flex: 1; }
  .keybar .stat.is-loading { color: var(--yellow); }
  .keybar .stat.is-error { color: var(--red); }
  .keybar .stat.is-ok { color: var(--green); }

  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; background: var(--fg-dim); }
  .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.loading { background: var(--yellow); }
  .dot.err { background: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <div class="seg brand">▎ gixen</div>
  <a class="seg nav" href="/v2">snipes</a>
  <a class="seg nav" href="/v2/comics">comics</a>
  <a class="seg nav active" href="/v2/bids">▸ bids</a>
  <div class="spacer"></div>
  <div class="seg host">mac-mini.tail9b7fa5.ts.net</div>
  <div class="seg clock" id="clock">--:--:--</div>
</div>

<div class="wrap">
  <div class="session" id="session">
    <span class="prompt">$</span> <span class="cmd">gixen-db</span> <span class="arg">--table</span> <span class="arg">bids</span> <span class="ok">▸ ready</span>
  </div>
  <div id="bids-section"></div>
</div>

<div class="keybar">
  <span><kbd>r</kbd>refresh</span>
  <span><kbd>s</kbd>snipes</span>
  <span><kbd>c</kbd>comics</span>
  <span><kbd>b</kbd>bids</span>
  <span class="spacer"></span>
  <span class="stat is-loading" id="status"><span class="dot loading"></span><span id="status-text">connecting…</span></span>
</div>

<script>
const REFRESH_MS = 60000;
const params = new URLSearchParams(location.search);
const SNIPES_URL = "/api/snipes";
const ebayUrl = id => `https://www.ebay.com/itm/${id}`;

function fmtUSD(s) {
  if (s == null) return "—";
  const n = parseFloat(String(s).replace(/[^0-9.]/g,""));
  return isNaN(n) ? "—" : `$${n.toFixed(2)}`;
}

function statusPill(s) {
  const u = (s||"").toUpperCase();
  if (u.includes("WON")) return '<span class="pill won">won</span>';
  if (u.startsWith("BID UNDER") || u === "OUTBID" || u === "LOST") return '<span class="pill lost">outbid</span>';
  if (u.startsWith("NETWORK ERROR")) return '<span class="pill err">net err</span>';
  if (u === "PENDING") return '<span class="pill pending">pending</span>';
  return `<span class="pill lost">${(s||"—").toLowerCase()}</span>`;
}

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function fmtDate(iso) {
  if (!iso) return '<span class="mute">—</span>';
  const d = new Date(iso);
  if (isNaN(d)) return '<span class="mute">—</span>';
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
}

function renderBids(snipes) {
  const el = document.getElementById("bids-section");
  if (!snipes.length) {
    el.innerHTML = `<div class="panel">
      <div class="panel-head"><span class="label">bids</span><span class="count">0 rows</span></div>
      <div class="empty">// no bids</div>
    </div>`;
    return;
  }
  const rows = snipes.map(r => `<tr>
    <td><a class="id" href="${ebayUrl(r.item_id)}" target="_blank">${escapeHtml(r.item_id)}</a></td>
    <td class="wrap">${escapeHtml((r.title || r.comic_title || "—").slice(0,80))}</td>
    <td class="right num">${fmtUSD(r.max_bid)}</td>
    <td class="right num">${r.bid_offset != null ? `${r.bid_offset}s` : '<span class="mute">—</span>'}</td>
    <td class="num dim">${r.snipe_group ?? 0}</td>
    <td>${statusPill(r.status)}</td>
    <td>${r.status_mirror ? statusPill(r.status_mirror) : '<span class="mute">—</span>'}</td>
    <td class="right num">${r.winning_bid != null ? `$${parseFloat(r.winning_bid).toFixed(2)}` : '<span class="mute">—</span>'}</td>
    <td class="num dim">${fmtDate(r.end_date_iso)}</td>
    <td class="dim">${escapeHtml(r.seller || "—")}</td>
    <td class="num dim">${r.comic_id ?? '<span class="mute">—</span>'}</td>
  </tr>`).join("");
  el.innerHTML = `<div class="panel">
    <div class="panel-head">
      <span class="label">bids</span>
      <span class="count">${snipes.length} rows</span>
      <span class="badge">live</span>
    </div>
    <div class="scroll"><table><thead><tr>
      <th>item_id</th><th>title</th>
      <th class="right">max_bid</th><th class="right">offset</th>
      <th>group</th><th>status</th><th>mirror</th>
      <th class="right">winning</th><th>end_date</th>
      <th>seller</th><th>comic_id</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

function setStatus(state, text) {
  const el = document.getElementById("status");
  const t = document.getElementById("status-text");
  el.classList.remove("is-loading","is-error","is-ok");
  el.classList.add("is-"+state);
  el.querySelector(".dot").className = "dot " + (state === "ok" ? "ok" : state === "error" ? "err" : "loading");
  t.textContent = text;
}

function tickClock() { document.getElementById("clock").textContent = new Date().toLocaleTimeString(); }
setInterval(tickClock, 1000); tickClock();

async function load() {
  setStatus("loading", `fetching ${SNIPES_URL}…`);
  try {
    const resp = await fetch(SNIPES_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const snipes = await resp.json();
    renderBids(snipes);
    const now = new Date().toLocaleTimeString();
    document.getElementById("session").innerHTML =
      `<span class="prompt">$</span> <span class="cmd">gixen-db</span> <span class="arg">--table</span> <span class="arg">bids</span> <span class="ok">▸ ${snipes.length} rows · synced ${now}</span>`;
    setStatus("ok", `${snipes.length} rows`);
  } catch (e) {
    setStatus("error", e.message);
    document.getElementById("session").innerHTML = `<span class="prompt">$</span> <span class="cmd">gixen-db</span> <span class="err">▸ ${e.message}</span>`;
  }
}

document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "r") load();
  if (e.key === "s") location.href = "/v2";
  if (e.key === "c") location.href = "/v2/comics";
  if (e.key === "b") location.href = "/v2/bids";
});

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
