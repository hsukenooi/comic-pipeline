<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gixen :: snipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f0a;
    --fg: #b8ffb8;
    --fg-bright: #00ff66;
    --fg-dim: #4a8a4a;
    --fg-fade: #2c5230;
    --warn: #ffd866;
    --err: #ff5555;
    --box: #2c5230;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "VT323", "JetBrains Mono", monospace;
    font-size: 20px;
    line-height: 1.25;
    padding: 24px 28px 80px;
    text-shadow: 0 0 1px rgba(0,255,100,0.4);
    position: relative;
    overflow-x: auto;
  }

  /* scanlines */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0) 4px
    );
    z-index: 100;
  }

  /* subtle vignette */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
    z-index: 99;
  }

  a { color: var(--fg-bright); text-decoration: none; }
  a:hover { background: var(--fg-bright); color: var(--bg); }

  .banner {
    color: var(--fg-bright);
    white-space: pre;
    font-size: 18px;
    line-height: 1.05;
    margin-bottom: 8px;
  }

  .meta {
    color: var(--fg-dim);
    margin-bottom: 18px;
  }

  .meta .blink {
    animation: blink 1s steps(2,start) infinite;
    color: var(--fg-bright);
  }

  @keyframes blink { to { visibility: hidden; } }

  .panel {
    border: 1px solid var(--box);
    margin-bottom: 24px;
    position: relative;
  }

  .panel-title {
    position: absolute;
    top: -13px;
    left: 14px;
    background: var(--bg);
    padding: 0 8px;
    color: var(--fg-bright);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 18px;
  }

  .panel-body { padding: 18px 16px 12px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    color: var(--fg-dim);
    font-weight: 400;
    padding: 0 10px 8px;
    border-bottom: 1px dashed var(--box);
    text-transform: uppercase;
    font-size: 17px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  tbody tr { border-bottom: 1px dotted #1a3320; }
  tbody tr:hover { background: rgba(0,255,100,0.06); }
  tbody tr.overbid { background: rgba(255,85,85,0.08); }
  tbody tr.overbid:hover { background: rgba(255,85,85,0.15); }

  td {
    padding: 6px 10px;
    vertical-align: top;
    white-space: nowrap;
  }

  td.title { white-space: normal; max-width: 360px; line-height: 1.2; }

  .right { text-align: right; }
  .dim { color: var(--fg-dim); }
  .bright { color: var(--fg-bright); }
  .warn { color: var(--warn); }
  .err { color: var(--err); }
  .won { color: var(--fg-bright); font-weight: 700; }
  .lost { color: var(--fg-dim); }

  .flags {
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 12px 16px;
    margin-bottom: 24px;
    background: rgba(255,216,102,0.04);
  }

  .flags h3 {
    text-transform: uppercase;
    font-size: 17px;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .flags ul { list-style: none; }
  .flags li::before { content: "[!] "; }

  .empty { color: var(--fg-fade); padding: 6px 10px; }

  .statusbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--fg-bright);
    color: var(--bg);
    padding: 4px 14px;
    font-size: 18px;
    z-index: 101;
    display: flex;
    justify-content: space-between;
    text-shadow: none;
  }

  .statusbar.is-error { background: var(--err); color: #fff; }
  .statusbar.is-loading { background: var(--warn); color: #000; }
</style>
</head>
<body>

<pre class="banner">
  ___ _____  _____ _   _ ___ ___  ___
 / __|_ _\ \/ / __| \ | / __/ __|/ _ \
| (_ || | >  <| _||  \| \__ \__ \ (_) |
 \___|___/_/\_\___|_|\_|___/___/\___/  v1.crt
</pre>

<div class="meta" id="meta">connecting…<span class="blink">_</span></div>

<div id="flags-container"></div>
<div id="active-section"></div>
<div id="ended-section"></div>

<div class="statusbar" id="status">
  <span id="status-left">[boot] establishing link…</span>
  <span id="status-right">gixen.snipes://localhost</span>
</div>

<script>
const REFRESH_MS = 30000;
const ebayUrl = id => `https://www.ebay.com/itm/${id}`;

function timeLeft(iso) {
  if (!iso) return "—";
  const diff = new Date(iso) - Date.now();
  if (diff <= 0) return "ENDED";
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const parts = [];
  if (d) parts.push(`${d}d`);
  if (h) parts.push(`${h}h`);
  if (m) parts.push(`${m}m`);
  return parts.length ? parts.join(" ") : "<1m";
}

const isEnded = r => r.end_date_iso ? new Date(r.end_date_iso) <= Date.now() : (r.time_to_end||"").toUpperCase() === "ENDED";
const parseAmt = s => { if (s==null) return null; const n = parseFloat(String(s).replace(/[^0-9.]/g,"")); return isNaN(n) ? null : n; };
const fmtUSD = s => { const n = parseAmt(s); return n != null ? `$${n.toFixed(2)}` : "—"; };

function mapStatus(r) {
  const s = (r.status||"").toUpperCase(), sm = (r.status_mirror||"").toUpperCase();
  if (s.includes("WON")||sm.includes("WON")) return '<span class="won">[won]</span>';
  if (s.startsWith("BID UNDER")||s==="OUTBID"||s==="LOST"||sm.startsWith("BID UNDER")||sm==="OUTBID"||sm==="LOST") return '<span class="lost">[outbid]</span>';
  if (s.startsWith("NETWORK ERROR")||sm.startsWith("NETWORK ERROR")) return '<span class="err">[net-err]</span>';
  if (s==="PENDING") return '<span class="dim">[pending]</span>';
  return `<span class="dim">[${(r.status||"—").toLowerCase()}]</span>`;
}

const displayTitle = r => { const t = r.title||r.comic_title||"—"; return t.length>55 ? t.slice(0,54)+"…" : t; };

function buildFlags(snipes) {
  const lines = [];
  for (const r of snipes) {
    if (!isEnded(r)) {
      const cur = parseAmt(r.current_bid), max = parseAmt(r.max_bid);
      if (cur!=null && max!=null && cur>=max) lines.push(`#${r.item_id} "${displayTitle(r)}" — current $${cur.toFixed(2)} ≥ max $${max.toFixed(2)}. raise or cancel.`);
    } else {
      const s = (r.status||"").toUpperCase(), sm = (r.status_mirror||"").toUpperCase();
      if (s.startsWith("NETWORK ERROR") && sm.startsWith("NETWORK ERROR")) lines.push(`#${r.item_id} "${displayTitle(r)}" — bid failed on main+mirror. re-snipe if relisted.`);
    }
  }
  return lines;
}

function renderActive(snipes) {
  const active = snipes.filter(r => !isEnded(r)).sort((a,b)=>(a.end_date_iso?new Date(a.end_date_iso):Infinity)-(b.end_date_iso?new Date(b.end_date_iso):Infinity));
  const el = document.getElementById("active-section");
  if (!active.length) {
    el.innerHTML = `<div class="panel"><div class="panel-title">active [0]</div><div class="panel-body"><div class="empty">// no active snipes</div></div></div>`;
    return;
  }
  const rows = active.map(r => {
    const cur = parseAmt(r.current_bid), max = parseAmt(r.max_bid);
    const overbid = cur!=null && max!=null && cur>=max;
    const tl = r.end_date_iso ? timeLeft(r.end_date_iso) : (r.time_to_end||"—");
    const urgent = r.end_date_iso && (new Date(r.end_date_iso)-Date.now()) < 3600000;
    const timeCell = urgent ? `<span class="warn">${tl}</span>` : tl;
    const maxCell = overbid ? `<span class="err">$${max.toFixed(2)} !</span>` : fmtUSD(r.max_bid);
    return `<tr class="${overbid?"overbid":""}">
      <td><a href="${ebayUrl(r.item_id)}" target="_blank">${r.item_id}</a></td>
      <td class="title">${displayTitle(r)}</td>
      <td class="right">${fmtUSD(r.current_bid)}</td>
      <td class="right">${maxCell}</td>
      <td class="right">${timeCell}</td>
      <td class="dim">${r.seller||"—"}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<div class="panel"><div class="panel-title">active [${active.length}]</div><div class="panel-body">
    <table><thead><tr>
      <th>item</th><th>title</th>
      <th class="right">current</th><th class="right">max</th>
      <th class="right">t-minus</th><th>seller</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div></div>`;
}

function renderEnded(snipes) {
  const ended = snipes.filter(r => isEnded(r)).sort((a,b)=>(b.end_date_iso?new Date(b.end_date_iso):0)-(a.end_date_iso?new Date(a.end_date_iso):0));
  const el = document.getElementById("ended-section");
  if (!ended.length) {
    el.innerHTML = `<div class="panel"><div class="panel-title">ended [0]</div><div class="panel-body"><div class="empty">// no ended snipes</div></div></div>`;
    return;
  }
  const rows = ended.map(r => {
    const winning = r.winning_bid != null ? `$${parseFloat(r.winning_bid).toFixed(2)}` : fmtUSD(r.current_bid);
    return `<tr>
      <td><a href="${ebayUrl(r.item_id)}" target="_blank">${r.item_id}</a></td>
      <td class="title">${displayTitle(r)}</td>
      <td class="right">${winning}</td>
      <td class="right">${fmtUSD(r.max_bid)}</td>
      <td>${mapStatus(r)}</td>
      <td class="dim">${r.seller||"—"}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<div class="panel"><div class="panel-title">recent [${ended.length}]</div><div class="panel-body">
    <table><thead><tr>
      <th>item</th><th>title</th>
      <th class="right">winning</th><th class="right">max</th>
      <th>result</th><th>seller</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div></div>`;
}

function renderFlags(snipes) {
  const flags = buildFlags(snipes);
  const el = document.getElementById("flags-container");
  el.innerHTML = flags.length ? `<div class="flags"><h3>! attention required</h3><ul>${flags.map(f=>`<li>${f}</li>`).join("")}</ul></div>` : "";
}

async function load() {
  const sb = document.getElementById("status");
  const sl = document.getElementById("status-left");
  sl.textContent = "[sync] fetching /api/snipes…";
  sb.classList.remove("is-error"); sb.classList.add("is-loading");

  try {
    const resp = await fetch("/api/snipes");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const snipes = await resp.json();
    renderFlags(snipes); renderActive(snipes); renderEnded(snipes);
    const now = new Date().toLocaleTimeString();
    document.getElementById("meta").innerHTML = `${snipes.length} snipe(s) loaded · last sync ${now} · auto-refresh 30s<span class="blink">_</span>`;
    sl.textContent = `[ok] ${snipes.length} rows · next sync in 30s`;
    sb.classList.remove("is-loading");
  } catch (e) {
    sb.classList.remove("is-loading"); sb.classList.add("is-error");
    sl.textContent = `[err] ${e.message}`;
    document.getElementById("meta").textContent = `failed: ${e.message}`;
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
