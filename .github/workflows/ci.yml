name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # U8a/BUI-59: keep CI green on the monorepo layout and exercise the uv
  # workspace install (incl. the gixen-cli py-modules fix, KTD2) in a clean env.
  # BUI-140: CI now runs the per-package test suites — the previous job only
  # smoke-imported symbols, so any regression to a guarded invariant (the
  # BUI-50 tombstone filter, the R11 dupe-buy guard, the FMV FK chain, …)
  # merged green. The suites are the merge gate now, not just import checks.
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace (packages/* + plugins/*)
        run: uv sync --all-packages

      - name: Smoke — workspace imports + gixen console script (KTD2 py-modules fix)
        run: |
          uv run python -c "import server.main; import gixen.plugins; print('workspace imports OK')"
          uv run gixen --help > /dev/null && echo "gixen console script OK"

      - name: Smoke — overlay resolves gixen-cli via the workspace (no path hack)
        run: |
          uv run python -c "import gixen_overlay.routes; from server.main import _ensure_fresh_sync, _iso_to_relative, _spawn_fallback_task; from server.db import get_bid_by_item_id; print('overlay -> gixen-cli coupling OK')"

      - name: Check plugin structure
        run: |
          uv run python -c "import ast; ast.parse(open('plugins/gixen-overlay/src/gixen_overlay/plugin.py').read()); print('plugin.py parses OK')"

      # BUI-140: the workspace-member suites. Playwright is mocked in locg-cli's
      # tests (no browser binaries needed), so a plain `uv run pytest` is safe.
      # gixen-cli's integration-marked tests are excluded here (they need live
      # Gixen/network); everything else is the merge gate.
      - name: Test — gixen-cli
        run: uv run pytest -m "not integration"
        working-directory: packages/gixen-cli

      - name: Test — locg-cli
        run: uv run pytest
        working-directory: packages/locg-cli

      - name: Test — gixen-overlay
        run: uv run pytest
        working-directory: plugins/gixen-overlay

  # apps/* are NOT uv workspace members (installed via `uv tool install` in
  # scripts/install.sh). They each carry their own pyproject + .venv, so test
  # them with a self-contained `uv run pytest` from their own dir. BUI-140.
  apps-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # apps/ebay + apps/fmv don't declare pytest as a dependency (it's not
      # part of their runtime), so provision it for the run with `--with`.
      - name: Test — apps/ebay
        run: uv run --with pytest pytest
        working-directory: apps/ebay

      - name: Test — apps/fmv
        run: uv run --with pytest pytest
        working-directory: apps/fmv

  # BUI-185: ruff bare/blind-except lint gate. Runs from the repo root so it
  # covers all packages, plugins, and apps in one pass. The rule set is minimal
  # (E722 bare-except, BLE001 blind-Exception, B904 raise-without-from) — just
  # the exception-handling hygiene rules, not the full ruff default set.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint — ruff bare/blind-except check
        run: uvx ruff check .

  # BUI-188: non-strict mypy type check on the two most None-juggling files.
  # The workspace must be synced first so gixen_overlay imports resolve.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace (packages/* + plugins/*)
        run: uv sync --all-packages

      - name: Type check — mypy (non-strict, targeted files)
        run: uvx mypy --ignore-missing-imports apps/fmv/src/fmv_runner.py plugins/gixen-overlay/src/gixen_overlay/routes.py

  # ezship is a standalone TypeScript CLI (apps/ezship). vitest, not pytest.
  ezship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci
        working-directory: apps/ezship

      - name: Type check — tsc --noEmit (BUI-188)
        run: npx tsc --noEmit
        working-directory: apps/ezship

      - name: Test
        run: npm test
        working-directory: apps/ezship
