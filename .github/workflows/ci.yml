name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check plugin structure
        run: |
          python -c "import ast, sys
          tree = ast.parse(open('plugins/gixen-overlay/src/gixen_overlay/plugin.py').read())
          print('plugin.py parses OK')
          "
